version: "3.8"

services:
  admin:
    build: ./admin/server
    container_name: admin-backend
    restart: always

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: php-backend
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./admin/frontend:/var/www/admin-frontend
    depends_on:
      - admin
      - php
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: wium_lie_demo
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"   # optional (for phpMyAdmin / debugging)
volumes:
  db_data:
