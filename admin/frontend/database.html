<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Database Management - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <nav class="bg-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <h1 class="text-xl font-bold text-gray-800">Admin Portal</h1>
          </div>
          <div class="flex items-center space-x-4">
            <a
              href="dashboard.html"
              class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium"
              >Dashboard</a
            >
            <a
              href="users.html"
              class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium"
              >Users</a
            >
            <a
              href="database.html"
              class="text-blue-600 font-semibold px-3 py-2 rounded-md text-sm font-medium"
              >Database</a
            >
            <a
              href="verification.html"
              class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium"
              >Verification</a
            >
            <button
              onclick="logout()"
              class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md text-sm font-medium"
            >
              Logout
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900">Database Management</h2>
        <p class="text-gray-600 mt-2">
          View and manage database tables and records
        </p>
      </div>

      <div id="messageDiv" class="hidden mb-6 px-4 py-3 rounded-lg"></div>

      <div id="loadingState" class="text-center py-12">
        <div
          class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"
        ></div>
        <p class="mt-4 text-gray-600">Loading database metadata...</p>
      </div>

      <div
        id="tablesContainer"
        class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8"
      >
        <!-- data -->
      </div>

      <div
        id="recordsContainer"
        class="hidden bg-white rounded-lg shadow-md overflow-hidden"
      >
        <div
          class="px-6 py-4 border-b border-gray-200 flex justify-between items-center"
        >
          <div>
            <h3
              class="text-xl font-semibold text-gray-900"
              id="tableNameHeader"
            >
              Table Records
            </h3>
            <p class="text-sm text-gray-600 mt-1" id="recordCount"></p>
          </div>
          <button
            onclick="closeRecordsView()"
            class="text-gray-600 hover:text-gray-900"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead id="recordsTableHead" class="bg-gray-50">
              <!-- headers -->
            </thead>
            <tbody
              id="recordsTableBody"
              class="bg-white divide-y divide-gray-200"
            >
              <!-- records -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="js/database.js"></script>
  </body>
</html>
